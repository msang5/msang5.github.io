<!DOCTYPE html>

    <meta name="keywords" content="Supply Chain Analyst, SQL, Power BI, Python, Portfolio">
    <meta name="theme-color" content="#0F172A">
    <meta property="og:type" content="website">

    <title>Manmohan S. | Supply Chain Analyst</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="#home" class="nav-brand" id="nav-brand" aria-label="Go to home">MS</a>
            <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Open navigation menu" aria-controls="nav-menu" aria-expanded="false"><span></span><span></span><span></span></button>
            <ul class="nav-menu" id="nav-menu"></ul>
        </div>
    </nav>

    <!-- Hero -->
    <main id="main-content">
    <section id="home" class="hero-section" aria-labelledby="hero-name">
        <div class="container">
            <p class="hero-greeting" id="hero-greeting"></p>
            <h1 class="hero-name" id="hero-name"></h1>
            <h2 class="hero-title" id="hero-title"></h2>
            <p class="hero-tagline" id="hero-tagline"></p>
            <p class="hero-description" id="hero-description"></p>
            <div class="hero-cta" id="hero-cta"></div>
            <div class="hero-social" id="hero-social"></div>
            <div class="hero-stats" id="hero-stats"></div>
        </div>
    </section>

    <!-- About -->
    <section id="about" class="section">
        <div class="container">
            <h2 class="section-title" id="about-title">About</h2>
            <div class="about-content" id="about-content"></div>
            <div class="about-highlights" id="about-highlights"></div>
        </div>
    </section>

    <!-- Experience -->
    <section id="experience" class="section" aria-labelledby="experience-title">
        <div class="container">
            <h2 class="section-title" id="experience-title">Experience</h2>
            <div class="timeline" id="experience-list"></div>
        </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section" aria-labelledby="projects-title">
        <div class="container">
            <h2 class="section-title" id="projects-title">Projects</h2>
            <div class="work-grid" id="projects-grid"></div>
        </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section">
        <div class="container">
            <h2 class="section-title" id="skills-title">Skills</h2>
            <div class="skills-grid" id="skills-grid"></div>
        </div>
    </section>

    <!-- Education -->
    <section id="education" class="section" aria-labelledby="education-title">
        <div class="container">
            <h2 class="section-title" id="education-title">Education</h2>
            <div class="education-grid" id="education-list"></div>
            <div class="certifications" id="certifications"></div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title" id="contact-title">Contact</h2>
            <p class="section-subtitle" id="contact-subtitle"></p>
            <div class="contact-info" id="contact-info"></div>
            <div class="contact-social" id="contact-social"></div>
        </div>
    </section>

    </main>
    <p class="content-status" id="content-status" role="alert" hidden></p>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p id="footer-text"></p>
            <p id="footer-copyright"></p>
            <div id="footer-links"></div>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top"><i class="fas fa-arrow-up" aria-hidden="true"></i></button>
    <script src="assets/js/main.js"></script>
